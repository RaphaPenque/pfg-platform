name: Smoke Tests

on: [push, workflow_dispatch]

env:
  PLATFORM_URL: https://pfg-platform.onrender.com

jobs:
  api-smoke-test:
    name: Portal API shape tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx tests/smoke/portal-api.test.ts

  download-smoke-test:
    name: Playwright download tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/smoke/downloads.spec.ts
